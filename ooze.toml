[scope]
exclude = [
  "target/**",
  ".ooze/**",
  "tests/fixtures/**"
]

[mutation]
strategy = "actionable"
limit = 25
coverage = ["lcov:lcov.info"]

[runner]
jobs = 4
timeout_seconds = 180
workspace_backend = "auto"
warmup = true
per_worker_cache = true
pre_run = ["cargo", "llvm-cov", "--lcov", "--output-path", "lcov.info"]

[probe]
command = ["cargo", "test"]
env = [
  "CARGO_TARGET_DIR={build_cache}"
]

[report]
format = "agent-tasks-markdown"
output = "crap-mutant-report.md"
detail = "normal"
only_survivors = true
