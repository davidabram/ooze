# ooze config — canonical example.
# Drop this at the repo root as `ooze.toml` and edit to taste.
# CLI flags always override these values.

[scope]
# Extra exclude globs on top of DEFAULT_EXCLUDES (.git, target, .ooze) and .gitignore.
exclude = []

[mutation]
strategy = "actionable"
# operators = ["comparison_boundary", "comparison_negation", "negate_equality", "swap_logical", "swap_boolean", "remove_not"]
# exclude_operators = []
static_skips = true
context_lines = 3
# limit = 50
# lcov = "lcov.info"

[runner]
workspace_backend = "auto"
jobs = 2
timeout_seconds = 120
preflight = true
shared_target = false
warmup = true
cache_dir = ".ooze/cache"
runs_dir = ".ooze/runs"

[probe]
command = ["cargo", "test", "--jobs", "1"]
# env = ["CARGO_HOME=.ooze/cache/cargo-home-{worker}"]

[report]
format = "human"
# output = "ooze-report.json"
fail_on_survivors = true
allow_incomplete = false
# Verbosity baseline: "compact", "normal", or "full".
# Defaults per format (human/agent-tasks/sarif = compact, json = normal).
# detail = "normal"
# Per-field overrides (compose on top of `detail`):
# diff = false           # drop unified diffs (CLI: --no-diff)
# stdout = false         # drop probe stdout    (CLI: --no-stdout)
# stderr = false         # drop probe stderr    (CLI: --no-stderr)
# only_survivors = true  # keep only survived mutants (CLI: --only-survivors)
